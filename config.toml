############################
## Basic Site Settings ##
############################

baseURL = "https://your-site.netlify.app/"
title = "My Website"
theme = "hugo-academic"

languageCode = "en-us"
defaultContentLanguage = "en"

enableEmoji = true
paginate = 10

############################
## Build & Processing ##
############################

enableGitInfo = false
removePathAccents = true

ignoreFiles = [
  "\\.ipynb$",
  ".ipynb_checkpoints$",
  "\\.Rmd$",
  "\\.Rmarkdown$",
  "_files$",
  "_cache$"
]

############################
## Outputs ##
############################

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

############################
## Markdown (IMPORTANT for old Academic)
############################

[blackfriday]
  hrefTargetBlank = true
  angledQuotes = false
  latexDashes = true

############################
## Imaging ##
############################

[imaging]
  resampleFilter = "lanczos"
  quality = 90

############################
## Taxonomies ##
############################

[taxonomies]
  tag = "tags"
  category = "categories"
  publication_type = "publication_types"
  author = "authors"