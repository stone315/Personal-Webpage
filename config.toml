############################
## Basic Site Settings ##
############################

baseURL = "https://your-actual-site.netlify.app/"  # TODO: Replace with your real Netlify URL
title = "My Website"
theme = "hugo-academic"

languageCode = "en-us"
defaultContentLanguage = "en"

enableEmoji = true
paginate = 10

############################
## Build & Processing ##
############################

enableGitInfo = false
removePathAccents = true

ignoreFiles = [
  "\\.ipynb$",
  ".ipynb_checkpoints$",
  "\\.Rmd$",
  "\\.Rmarkdown$",
  "_files$",
  "_cache$"
]

############################
## Outputs ##
############################

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

############################
## Markdown ##
############################

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allows raw HTML in markdown (replaces blackfriday hrefTargetBlank)
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    style = "monokai"

############################
## Imaging ##
############################

[imaging]
  resampleFilter = "lanczos"
  quality = 90

############################
## Taxonomies ##
############################

[taxonomies]
  tag = "tags"
  category = "categories"
  publication_type = "publication_types"
  author = "authors"