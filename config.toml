# Basic site settings
baseURL = "https://your-site.netlify.app/"
title = "My Website"
theme = "hugo-academic"

googleAnalytics = ""

############################
## Core settings ##
############################

defaultContentLanguage = "en"
hasCJKLanguage = false
defaultContentLanguageInSubdir = false
removePathAccents = true

paginate = 10
enableEmoji = true

ignoreFiles = [
  "\\.ipynb$",
  ".ipynb_checkpoints$",
  "\\.Rmd$",
  "\\.Rmarkdown$",
  "_files$",
  "_cache$"
]

############################
## Output settings ##
############################

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

############################
## Modern Markdown (Goldmark)
############################

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # allows HTML in markdown

############################
## Imaging ##
############################

[imaging]
  resampleFilter = "lanczos"
  quality = 90
  anchor = "smart"

############################
## Taxonomies ##
############################

[taxonomies]
  tag = "tags"
  category = "categories"
  publication_type = "publication_types"
  author = "authors"